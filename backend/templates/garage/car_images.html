```html
<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>Yassen Garage 🚗</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .image-card{
            margin-bottom:25px;
        }

        .image-card img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:10px;
            transition:.3s;
            box-shadow:0 4px 10px rgba(0,0,0,.15);
        }

        .image-card img:hover{
            transform:scale(1.03);
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="text-center mb-4">

        <a href="/" class="btn btn-dark">
            🏠 الرئيسية
        </a>

        <a href="/cars/" class="btn btn-primary">
            🚗 السيارات
        </a>

        <a href="javascript:history.back()" class="btn btn-secondary">
            ⬅ رجوع
        </a>

        <a href="/logout/" class="btn btn-danger">
            🚪 تسجيل خروج
        </a>

    </div>

    <h2 class="mb-4 text-center">
        صور رخص السيارة {{ car.owner_name }}
    </h2>

    <div class="row">

        {% for image in images %}

        <div class="col-md-4 image-card">

            <a href="{{ image.image.url }}" target="_blank">

                <img
                    src="{{ image.image.url }}"
                    alt="License Image"
                    class="img-fluid">

            </a>

            <div class="mt-2">

                <a
                    href="{% url 'delete_image' image.id %}"
                    class="btn btn-danger w-100"
                    onclick="return confirm('هل تريد حذف هذه الصورة؟')">

                    🗑️ حذف الصورة

                </a>

            </div>

        </div>

        {% empty %}

        <div class="col-12">

            <div class="alert alert-warning text-center">
                لا توجد صور لهذه السيارة
            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
```
