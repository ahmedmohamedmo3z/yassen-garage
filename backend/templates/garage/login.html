<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Yassen Garage Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.login-box{
    width:450px;
    margin:auto;
    margin-top:120px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.1);
}

</style>

</head>

<body>

<div class="login-box">

    <h2 class="text-center mb-4">
        🚗 Yassen Garage
    </h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label>اسم المستخدم</label>
            <input
                type="text"
                name="username"
                class="form-control">
        </div>

        <div class="mb-3">
            <label>كلمة المرور</label>
            <input
                type="password"
                name="password"
                class="form-control">
        </div>

        <button
            type="submit"
            class="btn btn-primary w-100">

            تسجيل الدخول

        </button>

    </form>

</div>

</body>
</html>
