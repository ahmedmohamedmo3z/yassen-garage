```html
<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Yassen Garage 🚗</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

.form-box{
    max-width:900px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<div class="container">

<div class="form-box">

<div class="mb-4">

    <a href="/" class="btn btn-dark">
        🏠 الرئيسية
    </a>

    <a href="/cars/" class="btn btn-primary">
        🚗 السيارات
    </a>

    <a href="javascript:history.back()" class="btn btn-secondary">
        ⬅ رجوع
    </a>

    <a href="/logout/" class="btn btn-danger">
        🚪 تسجيل خروج
    </a>

</div>

<h2 class="mb-4">🚗 إضافة سيارة جديدة</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">
<label>اسم صاحب السيارة</label>
{{ form.owner_name }}
</div>

<div class="col-md-6 mb-3">
<label>رقم الهاتف</label>
{{ form.phone }}
</div>

<div class="col-md-6 mb-3">
<label>نوع السيارة</label>
{{ form.car_type }}
</div>

<div class="col-md-6 mb-3">
<label>لون السيارة</label>
{{ form.car_color }}
</div>

<div class="col-md-6 mb-3">
<label>رقم اللوحة</label>
{{ form.plate_number }}
</div>

<div class="col-md-12 mb-3">
<label>ملاحظات</label>
{{ form.notes }}
</div>

<div class="col-md-12 mb-3">
<label>صور الرخصة</label>
<input
type="file"
name="license_images"
multiple
class="form-control">
</div>

</div>

<button type="submit" class="btn btn-success">
    💾 حفظ السيارة
</button>

<a href="/cars/" class="btn btn-secondary">
    عرض السيارات
</a>

</form>

</div>

</div>

</body>
</html>
```
