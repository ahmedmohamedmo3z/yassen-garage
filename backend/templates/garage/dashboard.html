
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yassen Garage 🚗</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

.dashboard-container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.header-box{
    background:#212529;
    color:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:25px;
}

.card-box{
    border:none;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,.08);
}

.number{
    font-size:40px;
    font-weight:bold;
}

.action-buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.action-buttons .btn{
    min-width:180px;
}

.stat-card{
    padding:25px;
}

@media (max-width:768px){

    .dashboard-container{
        padding:10px;
    }

    .header-box{
        text-align:center;
    }

    .action-buttons{
        flex-direction:column;
        margin-top:20px;
    }

    .action-buttons .btn{
        width:100%;
    }

    .number{
        font-size:32px;
    }

    h1{
        font-size:28px;
    }

    .stat-card{
        text-align:center;
    }
}

</style>

</head>

<body>

<div class="dashboard-container">

    <div class="header-box">

        <h1>🚗 Yassen Garage</h1>

        <p class="mb-0">
            نظام إدارة الجراج
        </p>

    </div>

    <div class="action-buttons mb-4">

        <a href="/add-car/" class="btn btn-success">
            ➕ إضافة سيارة
        </a>

        <a href="/cars/" class="btn btn-primary">
            🚗 السيارات
        </a>

        <a href="/logout/" class="btn btn-danger">
            🚪 تسجيل خروج
        </a>

    </div>

    <div class="row">

        <div class="col-md-6 mb-3">

            <div class="card card-box stat-card">

                <h5>🚗 إجمالي السيارات</h5>

                <div class="number text-primary">
                    {{ total_cars }}
                </div>

            </div>

        </div>

        <div class="col-md-6 mb-3">

            <div class="card card-box stat-card">

                <h5>📸 عدد صور الرخص</h5>

                <div class="number text-danger">
                    {{ total_images }}
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
